name: 시트 → data.json 동기화

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 09:00 KST (UTC 00:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch sheets data
        env:
          GOOGLE_JSON_KEY: ${{ secrets.GOOGLE_JSON_KEY }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python fetch_sheets.py

      - name: Commit data.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || (git commit -m "chore: update data.json" && git push)
